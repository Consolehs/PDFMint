name: pdfmint
description: "PDFMint - Offline PDF Araçları | Tamamen yerel, modern ve hızlı."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF İşleme
  syncfusion_flutter_pdf: ^26.2.14
  syncfusion_flutter_pdfviewer: ^26.2.14

  # Dosya İşlemleri
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Durum Yönetimi
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # Veritabanı
  sqflite_common_ffi: ^2.3.4+1

  # Animasyonlar
  lottie: ^3.1.2
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # UI Bileşenleri
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  # Drag & Drop
  desktop_drop: ^0.4.4

  # Pencere Yönetimi
  window_manager: ^0.3.9

  # Sistem
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
